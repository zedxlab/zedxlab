<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <style>
      @keyframes wave1 { 0%{d:path("M0,30 Q75,10 150,30 Q225,50 300,30 L300,100 Q225,120 150,100 Q75,80 0,100 Z")} 50%{d:path("M0,30 Q75,50 150,30 Q225,10 300,30 L300,100 Q225,80 150,100 Q75,120 0,100 Z")} 100%{d:path("M0,30 Q75,10 150,30 Q225,50 300,30 L300,100 Q225,120 150,100 Q75,80 0,100 Z")} }
      @keyframes wave2 { 0%{d:path("M0,100 Q75,80 150,100 Q225,120 300,100 L300,170 Q225,190 150,170 Q75,150 0,170 Z")} 50%{d:path("M0,100 Q75,120 150,100 Q225,80 300,100 L300,170 Q225,150 150,170 Q75,190 0,170 Z")} 100%{d:path("M0,100 Q75,80 150,100 Q225,120 300,100 L300,170 Q225,190 150,170 Q75,150 0,170 Z")} }
    </style>
  </defs>

  <!-- Pole -->
  <rect x="15" y="10" width="4" height="190" fill="#666" rx="2"/>

  <!-- Green stripe (top) -->
  <path fill="#006847" opacity="0.95">
    <animate attributeName="d" dur="3s" repeatCount="indefinite" values="
      M20,30 Q95,10 170,30 Q245,50 300,30 L300,70 Q245,90 170,70 Q95,50 20,70 Z;
      M20,30 Q95,50 170,30 Q245,10 300,30 L300,70 Q245,50 170,70 Q95,90 20,70 Z;
      M20,30 Q95,10 170,30 Q245,50 300,30 L300,70 Q245,90 170,70 Q95,50 20,70 Z"/>
  </path>

  <!-- White stripe (middle) -->
  <path fill="#fff" opacity="0.95">
    <animate attributeName="d" dur="3s" repeatCount="indefinite" values="
      M20,70 Q95,50 170,70 Q245,90 300,70 L300,130 Q245,150 170,130 Q95,110 20,130 Z;
      M20,70 Q95,90 170,70 Q245,50 300,70 L300,130 Q245,110 170,130 Q95,150 20,130 Z;
      M20,70 Q95,50 170,70 Q245,90 300,70 L300,130 Q245,150 170,130 Q95,110 20,130 Z"/>
  </path>

  <!-- Red stripe (bottom) -->
  <path fill="#CE1126" opacity="0.95">
    <animate attributeName="d" dur="3s" repeatCount="indefinite" values="
      M20,130 Q95,110 170,130 Q245,150 300,130 L300,170 Q245,190 170,170 Q95,150 20,170 Z;
      M20,130 Q95,150 170,130 Q245,110 300,130 L300,170 Q245,150 170,170 Q95,190 20,170 Z;
      M20,130 Q95,110 170,130 Q245,150 300,130 L300,170 Q245,190 170,170 Q95,150 20,170 Z"/>
  </path>

  <!-- Eagle emblem (center) -->
  <circle cx="160" cy="100" r="18" fill="none" stroke="#006847" stroke-width="1.5" opacity="0.8"/>
  <text x="160" y="106" text-anchor="middle" font-size="22" fill="#006847" opacity="0.8">&#x1F985;</text>
</svg>
