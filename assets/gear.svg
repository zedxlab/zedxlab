<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
      @keyframes spin-reverse { from{transform:rotate(360deg)} to{transform:rotate(0deg)} }
      .gear1 { animation: spin 3s linear infinite; transform-origin: 50px 50px; }
      .gear2 { animation: spin-reverse 4s linear infinite; transform-origin: 50px 50px; }
      .core { fill: #bd93f9; }
      .tooth { fill: #8B5CF6; }
      .inner { fill: #282a36; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="10" fill="#282a36"/>

  <!-- Outer gear -->
  <g class="gear1">
    <circle cx="50" cy="50" r="30" class="tooth"/>
    <rect x="45" y="12" width="10" height="15" rx="3" class="tooth"/>
    <rect x="45" y="73" width="10" height="15" rx="3" class="tooth"/>
    <rect x="12" y="45" width="15" height="10" rx="3" class="tooth"/>
    <rect x="73" y="45" width="15" height="10" rx="3" class="tooth"/>
    <rect x="20" y="20" width="12" height="10" rx="3" class="tooth" transform="rotate(45,26,25)"/>
    <rect x="68" y="20" width="12" height="10" rx="3" class="tooth" transform="rotate(-45,74,25)"/>
    <rect x="20" y="70" width="12" height="10" rx="3" class="tooth" transform="rotate(-45,26,75)"/>
    <rect x="68" y="70" width="12" height="10" rx="3" class="tooth" transform="rotate(45,74,75)"/>
  </g>

  <!-- Inner gear -->
  <g class="gear2">
    <circle cx="50" cy="50" r="18" class="core"/>
    <rect x="46" y="28" width="8" height="10" rx="2" class="core"/>
    <rect x="46" y="62" width="8" height="10" rx="2" class="core"/>
    <rect x="28" y="46" width="10" height="8" rx="2" class="core"/>
    <rect x="62" y="46" width="10" height="8" rx="2" class="core"/>
  </g>

  <!-- Center hole -->
  <circle cx="50" cy="50" r="6" class="inner"/>
  <circle cx="50" cy="50" r="3" fill="#bd93f9" opacity="0.5"/>
</svg>
