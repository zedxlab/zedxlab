<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <defs>
    <style>
      @keyframes fillbar { from{width:0} }
      .bar-bg { fill: #21222c; rx: 4; ry: 4; }
      .label { font-family: monospace; font-size: 13px; fill: #f8f8f2; }
      .pct { font-family: monospace; font-size: 12px; fill: #6272a4; }
      .title { font-family: monospace; font-size: 16px; fill: #bd93f9; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="600" height="380" rx="10" fill="#282a36"/>

  <!-- Title -->
  <text x="300" y="35" text-anchor="middle" class="title">$ skills --level</text>

  <!-- Separator -->
  <line x1="30" y1="50" x2="570" y2="50" stroke="#44475a" stroke-width="1"/>

  <!-- Python -->
  <text x="30" y="80" class="label">Python</text>
  <rect x="170" y="68" width="330" height="18" class="bar-bg"/>
  <rect x="170" y="68" width="297" height="18" rx="4" fill="#50fa7b" opacity="0.9">
    <animate attributeName="width" from="0" to="297" dur="1.5s" begin="0.5s" fill="freeze"/>
  </rect>
  <text x="510" y="81" class="pct">90%</text>

  <!-- Node.js -->
  <text x="30" y="112" class="label">Node.js</text>
  <rect x="170" y="100" width="330" height="18" class="bar-bg"/>
  <rect x="170" y="100" width="270" height="18" rx="4" fill="#8be9fd" opacity="0.9">
    <animate attributeName="width" from="0" to="270" dur="1.5s" begin="0.8s" fill="freeze"/>
  </rect>
  <text x="450" y="113" class="pct">82%</text>

  <!-- JavaScript -->
  <text x="30" y="144" class="label">JavaScript</text>
  <rect x="170" y="132" width="330" height="18" class="bar-bg"/>
  <rect x="170" y="132" width="260" height="18" rx="4" fill="#f1fa8c" opacity="0.9">
    <animate attributeName="width" from="0" to="260" dur="1.5s" begin="1.1s" fill="freeze"/>
  </rect>
  <text x="440" y="145" class="pct">79%</text>

  <!-- Bash/Shell -->
  <text x="30" y="176" class="label">Bash/Shell</text>
  <rect x="170" y="164" width="330" height="18" class="bar-bg"/>
  <rect x="170" y="164" width="250" height="18" rx="4" fill="#ff79c6" opacity="0.9">
    <animate attributeName="width" from="0" to="250" dur="1.5s" begin="1.4s" fill="freeze"/>
  </rect>
  <text x="430" y="177" class="pct">76%</text>

  <!-- Chromium CDP -->
  <text x="30" y="208" class="label">Chromium CDP</text>
  <rect x="170" y="196" width="330" height="18" class="bar-bg"/>
  <rect x="170" y="196" width="230" height="18" rx="4" fill="#bd93f9" opacity="0.9">
    <animate attributeName="width" from="0" to="230" dur="1.5s" begin="1.7s" fill="freeze"/>
  </rect>
  <text x="410" y="209" class="pct">70%</text>

  <!-- Linux -->
  <text x="30" y="240" class="label">Linux</text>
  <rect x="170" y="228" width="330" height="18" class="bar-bg"/>
  <rect x="170" y="228" width="244" height="18" rx="4" fill="#ffb86c" opacity="0.9">
    <animate attributeName="width" from="0" to="244" dur="1.5s" begin="2.0s" fill="freeze"/>
  </rect>
  <text x="424" y="241" class="pct">74%</text>

  <!-- Docker -->
  <text x="30" y="272" class="label">Docker</text>
  <rect x="170" y="260" width="330" height="18" class="bar-bg"/>
  <rect x="170" y="260" width="205" height="18" rx="4" fill="#ff5555" opacity="0.9">
    <animate attributeName="width" from="0" to="205" dur="1.5s" begin="2.3s" fill="freeze"/>
  </rect>
  <text x="385" y="273" class="pct">62%</text>

  <!-- Scraping -->
  <text x="30" y="304" class="label">Scraping</text>
  <rect x="170" y="292" width="330" height="18" class="bar-bg"/>
  <rect x="170" y="292" width="283" height="18" rx="4" fill="#50fa7b" opacity="0.9">
    <animate attributeName="width" from="0" to="283" dur="1.5s" begin="2.6s" fill="freeze"/>
  </rect>
  <text x="463" y="305" class="pct">86%</text>

  <!-- API Design -->
  <text x="30" y="336" class="label">API Design</text>
  <rect x="170" y="324" width="330" height="18" class="bar-bg"/>
  <rect x="170" y="324" width="290" height="18" rx="4" fill="#8be9fd" opacity="0.9">
    <animate attributeName="width" from="0" to="290" dur="1.5s" begin="2.9s" fill="freeze"/>
  </rect>
  <text x="470" y="337" class="pct">88%</text>

  <!-- Bottom line -->
  <line x1="30" y1="355" x2="570" y2="355" stroke="#44475a" stroke-width="1"/>
  <text x="300" y="373" text-anchor="middle" font-family="monospace" font-size="10" fill="#6272a4">ZEDXLAB Skill Matrix v2.0</text>
</svg>
