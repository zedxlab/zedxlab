<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 480" width="750" height="480">
  <defs>
    <style>
      @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
      @keyframes wipe { from{clip-path:inset(0 100% 0 0)} to{clip-path:inset(0 0% 0 0)} }
      .cur { animation: blink 0.53s step-end infinite; }

      /* Lines wipe in (simulate typing) */
      .w1  { animation: wipe 0.35s steps(8)  0.3s  both; }
      .w2  { animation: wipe 0.45s steps(10) 1.2s  both; }
      .w3  { animation: wipe 0.40s steps(10) 1.9s  both; }
      .w4  { animation: wipe 0.60s steps(14) 2.6s  both; }
      .w5  { animation: wipe 0.30s steps(7)  3.5s  both; }
      .w6  { animation: wipe 0.50s steps(13) 4.0s  both; }
      .w7  { animation: wipe 0.70s steps(18) 4.8s  both; }
      .w8  { animation: wipe 1.00s steps(26) 5.8s  both; }
      .w9  { animation: wipe 0.60s steps(16) 7.0s  both; }
      .w10 { animation: wipe 0.25s steps(20) 7.8s  both; }
      .w11 { animation: wipe 0.40s steps(10) 8.2s  both; }
      .w12 { animation: wipe 0.65s steps(16) 8.8s  both; }
      .w13 { animation: wipe 0.65s steps(16) 9.6s  both; }
      .w14 { animation: wipe 0.75s steps(18) 10.4s both; }
      .w15 { animation: wipe 0.75s steps(18) 11.3s both; }
      .w16 { animation: wipe 0.25s steps(20) 12.2s both; }
      .w17 { animation: wipe 0.80s steps(22) 12.6s both; }
      .w18 { animation: wipe 0.70s steps(16) 13.6s both; }
      .w19 { animation: wipe 0.20s steps(3)  14.5s both; }
    </style>
  </defs>

  <!-- Terminal bg -->
  <rect width="750" height="480" rx="10" fill="#282a36"/>
  <rect width="750" height="35" rx="10" fill="#21222c"/>
  <rect y="25" width="750" height="10" fill="#21222c"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="17" r="6" fill="#27c93f"/>
  <text x="375" y="22" text-anchor="middle" font-family="monospace" font-size="13" fill="#6272a4">zedxlab@termux ~ %</text>

  <!-- ===== LINE 1: $ whoami ===== -->
  <!-- Cursor at start, blinks, then moves right as text types -->
  <rect y="53" width="9" height="16" fill="#50fa7b" rx="1">
    <!-- Appear -->
    <animate attributeName="opacity" values="0;1" dur="0.01s" begin="0.3s" fill="freeze"/>
    <!-- Blink while waiting -->
    <animate attributeName="opacity" values="1;0;1;0;1" keyTimes="0;0.25;0.5;0.75;1" dur="0.53s" begin="0.3s" repeatCount="2"/>
    <!-- Move right as text types, then stay at end, then disappear -->
    <animate attributeName="x" values="20;28;28;80;80" keyTimes="0;0.01;0.15;0.4;0.85" dur="0.9s" begin="0.96s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.01;0.4;0.85;1" dur="0.9s" begin="0.96s" fill="freeze"/>
  </rect>
  <text x="20" y="65" font-family="monospace" font-size="14" class="w1">
    <tspan fill="#50fa7b">$</tspan><tspan fill="#f8f8f2"> whoami</tspan>
  </text>

  <!-- ===== LINE 2: name ===== -->
  <rect y="76" width="9" height="16" fill="#50fa7b" rx="1">
    <animate attributeName="opacity" values="0;1" dur="0.01s" begin="1.55s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1;0;1" keyTimes="0;0.25;0.5;0.75;1" dur="0.53s" begin="1.55s" repeatCount="1"/>
    <animate attributeName="x" values="28;28;68;68" keyTimes="0;0.1;0.5;1" dur="0.6s" begin="2.08s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.1;0.5;0.85;1" dur="0.6s" begin="2.08s" fill="freeze"/>
  </rect>
  <text x="20" y="88" font-family="monospace" font-size="13" class="w2">
    <tspan fill="#ff79c6">  name:</tspan><tspan fill="#8be9fd"> Zade</tspan>
  </text>

  <!-- ===== LINE 3: alias ===== -->
  <rect y="94" width="9" height="16" fill="#50fa7b" rx="1">
    <animate attributeName="opacity" values="0;1" dur="0.01s" begin="2.3s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" keyTimes="0;0.5;1" dur="0.53s" begin="2.3s" repeatCount="1"/>
    <animate attributeName="x" values="28;28;82;82" keyTimes="0;0.1;0.5;1" dur="0.6s" begin="2.83s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.1;0.5;0.85;1" dur="0.6s" begin="2.83s" fill="freeze"/>
  </rect>
  <text x="20" y="106" font-family="monospace" font-size="13" class="w3">
    <tspan fill="#ff79c6">  alias:</tspan><tspan fill="#8be9fd"> ZEDXLAB</tspan>
  </text>

  <!-- ===== LINE 4: role ===== -->
  <rect y="112" width="9" height="16" fill="#50fa7b" rx="1">
    <animate attributeName="opacity" values="0;1" dur="0.01s" begin="3.0s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1;0;1" keyTimes="0;0.25;0.5;0.75;1" dur="0.53s" begin="3.0s" repeatCount="1"/>
    <animate attributeName="x" values="28;28;180;180" keyTimes="0;0.1;0.5;1" dur="0.8s" begin="3.53s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.1;0.5;0.85;1" dur="0.8s" begin="3.53s" fill="freeze"/>
  </rect>
  <text x="20" y="124" font-family="monospace" font-size="13" class="w4">
    <tspan fill="#ff79c6">  role:</tspan><tspan fill="#8be9fd"> AI Engineer &amp; API Architect</tspan>
  </text>

  <!-- ===== LINE 5: location ===== -->
  <rect y="130" width="9" height="16" fill="#50fa7b" rx="1">
    <animate attributeName="opacity" values="0;1" dur="0.01s" begin="3.8s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" keyTimes="0;0.5;1" dur="0.53s" begin="3.8s" repeatCount="1"/>
    <animate attributeName="x" values="28;28;85;85" keyTimes="0;0.1;0.5;1" dur="0.5s" begin="4.33s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.1;0.5;0.85;1" dur="0.5s" begin="4.33s" fill="freeze"/>
  </rect>
  <text x="20" y="142" font-family="monospace" font-size="13" class="w5">
    <tspan fill="#ff79c6">  location:</tspan><tspan fill="#8be9fd"> Mexico</tspan>
  </text>

  <!-- ===== LINE 6: focus ===== -->
  <rect y="148" width="9" height="16" fill="#50fa7b" rx="1">
    <animate attributeName="opacity" values="0;1" dur="0.01s" begin="4.5s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1;0;1" keyTimes="0;0.25;0.5;0.75;1" dur="0.53s" begin="4.5s" repeatCount="1"/>
    <animate attributeName="x" values="28;28;185;185" keyTimes="0;0.1;0.5;1" dur="0.7s" begin="5.03s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.1;0.5;0.85;1" dur="0.7s" begin="5.03s" fill="freeze"/>
  </rect>
  <text x="20" y="160" font-family="monospace" font-size="13" class="w6">
    <tspan fill="#ff79c6">  focus:</tspan><tspan fill="#8be9fd"> Building free, open AI tools</tspan>
  </text>

  <!-- ===== LINE 7: stack ===== -->
  <rect y="166" width="9" height="16" fill="#50fa7b" rx="1">
    <animate attributeName="opacity" values="0;1" dur="0.01s" begin="5.5s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1;0;1" keyTimes="0;0.25;0.5;0.75;1" dur="0.53s" begin="5.5s" repeatCount="1"/>
    <animate attributeName="x" values="28;28;235;235" keyTimes="0;0.1;0.5;1" dur="0.9s" begin="6.03s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.1;0.5;0.85;1" dur="0.9s" begin="6.03s" fill="freeze"/>
  </rect>
  <text x="20" y="178" font-family="monospace" font-size="13" class="w7">
    <tspan fill="#ff79c6">  stack:</tspan><tspan fill="#8be9fd"> Node.js | Python | CDP | Vercel | TG Bots</tspan>
  </text>

  <!-- ===== LINE 8: philosophy ===== -->
  <rect y="184" width="9" height="16" fill="#50fa7b" rx="1">
    <animate attributeName="opacity" values="0;1" dur="0.01s" begin="6.5s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1;0;1" keyTimes="0;0.25;0.5;0.75;1" dur="0.53s" begin="6.5s" repeatCount="2"/>
    <animate attributeName="x" values="28;28;290;290" keyTimes="0;0.1;0.5;1" dur="1.2s" begin="7.56s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.1;0.5;0.85;1" dur="1.2s" begin="7.56s" fill="freeze"/>
  </rect>
  <text x="20" y="196" font-family="monospace" font-size="13" class="w8">
    <tspan fill="#ff79c6">  philosophy:</tspan><tspan fill="#f1fa8c"> "If it costs money, someone will build it free"</tspan>
  </text>

  <!-- ===== LINE 9: status ===== -->
  <rect y="202" width="9" height="16" fill="#50fa7b" rx="1">
    <animate attributeName="opacity" values="0;1" dur="0.01s" begin="9.0s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1;0;1" keyTimes="0;0.25;0.5;0.75;1" dur="0.53s" begin="9.0s" repeatCount="1"/>
    <animate attributeName="x" values="28;28;185;185" keyTimes="0;0.1;0.5;1" dur="0.7s" begin="9.53s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.1;0.5;0.85;1" dur="0.7s" begin="9.53s" fill="freeze"/>
  </rect>
  <text x="20" y="214" font-family="monospace" font-size="13" class="w9">
    <tspan fill="#ff79c6">  status:</tspan><tspan fill="#50fa7b"> Always shipping, never stopping</tspan>
  </text>

  <!-- ===== LINE 10: separator ===== -->
  <text x="20" y="238" font-family="monospace" font-size="13" class="w10">
    <tspan fill="#6272a4">  ────────────────────────────────────────────────</tspan>
  </text>

  <!-- ===== LINE 11: $ cat stats ===== -->
  <rect y="248" width="9" height="16" fill="#50fa7b" rx="1">
    <animate attributeName="opacity" values="0;1" dur="0.01s" begin="8.45s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" keyTimes="0;0.5;1" dur="0.53s" begin="8.45s" repeatCount="1"/>
    <animate attributeName="x" values="28;28;125;125" keyTimes="0;0.1;0.5;1" dur="0.5s" begin="8.98s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.1;0.5;0.85;1" dur="0.5s" begin="8.98s" fill="freeze"/>
  </rect>
  <text x="20" y="260" font-family="monospace" font-size="14" class="w11">
    <tspan fill="#50fa7b">$</tspan><tspan fill="#f8f8f2"> cat /etc/stats.json</tspan>
  </text>

  <!-- ===== LINE 12: repos ===== -->
  <text x="20" y="282" font-family="monospace" font-size="13" class="w12">
    <tspan fill="#ff79c6">  repos:</tspan><tspan fill="#8be9fd"> 9+ public</tspan><tspan fill="#6272a4"> | </tspan><tspan fill="#ff79c6">apis:</tspan><tspan fill="#8be9fd"> 3 deployed on Vercel</tspan>
  </text>

  <!-- ===== LINE 13: models ===== -->
  <text x="20" y="300" font-family="monospace" font-size="13" class="w13">
    <tspan fill="#ff79c6">  models:</tspan><tspan fill="#8be9fd"> 13 image generators</tspan><tspan fill="#6272a4"> | </tspan><tspan fill="#ff79c6">voices:</tspan><tspan fill="#8be9fd"> 470+ TTS voices</tspan>
  </text>

  <!-- ===== LINE 14: os ===== -->
  <text x="20" y="318" font-family="monospace" font-size="13" class="w14">
    <tspan fill="#ff79c6">  os:</tspan><tspan fill="#8be9fd"> Linux aarch64 (Termux)</tspan><tspan fill="#6272a4"> | </tspan><tspan fill="#ff79c6">shell:</tspan><tspan fill="#8be9fd"> bash</tspan>
  </text>

  <!-- ===== LINE 15: editor ===== -->
  <text x="20" y="336" font-family="monospace" font-size="13" class="w15">
    <tspan fill="#ff79c6">  editor:</tspan><tspan fill="#8be9fd"> Claude Code + OpenClaude</tspan><tspan fill="#6272a4"> | </tspan><tspan fill="#ff79c6">ide:</tspan><tspan fill="#8be9fd"> VS Code</tspan>
  </text>

  <!-- ===== LINE 16: separator ===== -->
  <text x="20" y="360" font-family="monospace" font-size="13" class="w16">
    <tspan fill="#6272a4">  ────────────────────────────────────────────────</tspan>
  </text>

  <!-- ===== LINE 17: $ echo ===== -->
  <rect y="370" width="9" height="16" fill="#50fa7b" rx="1">
    <animate attributeName="opacity" values="0;1" dur="0.01s" begin="12.85s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1;0;1" keyTimes="0;0.25;0.5;0.75;1" dur="0.53s" begin="12.85s" repeatCount="1"/>
    <animate attributeName="x" values="28;28;330;330" keyTimes="0;0.1;0.5;1" dur="0.9s" begin="13.38s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.1;0.5;0.85;1" dur="0.9s" begin="13.38s" fill="freeze"/>
  </rect>
  <text x="20" y="382" font-family="monospace" font-size="14" class="w17">
    <tspan fill="#50fa7b">$</tspan><tspan fill="#f8f8f2"> echo "Status: $(curl -s zedxlab.vercel.app/api/health)"</tspan>
  </text>

  <!-- ===== LINE 18: Status output ===== -->
  <text x="20" y="404" font-family="monospace" font-size="14" class="w18">
    <tspan fill="#50fa7b">  Status: ALL SYSTEMS OPERATIONAL</tspan><tspan fill="#6272a4"> | </tspan><tspan fill="#8be9fd">0 errors</tspan>
  </text>

  <!-- ===== LINE 19: Final cursor ===== -->
  <rect y="418" width="9" height="16" fill="#50fa7b" rx="1">
    <animate attributeName="opacity" values="0;1;0;1" dur="1.06s" begin="14.5s" repeatCount="indefinite"/>
  </rect>
  <text x="20" y="430" font-family="monospace" font-size="14" class="w19">
    <tspan fill="#50fa7b">$</tspan>
  </text>
</svg>
