<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400">
  <defs>
    <style>
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes type1 { 0%{width:0} 100%{width:320px} }
      @keyframes type2 { 0%{width:0} 100%{width:280px} }
      @keyframes type3 { 0%{width:0} 100%{width:350px} }
      @keyframes type4 { 0%{width:0} 100%{width:200px} }
      @keyframes type5 { 0%{width:0} 100%{width:300px} }
      @keyframes type6 { 0%{width:0} 100%{width:260px} }
      @keyframes type7 { 0%{width:0} 100%{width:180px} }
      @keyframes fadein { 0%{opacity:0} 100%{opacity:1} }
      .cursor { animation: blink 1s step-end infinite; }
      .line1 { animation: type1 1.5s steps(40) 0.5s both, fadein 0.1s 0.5s both; overflow:hidden; white-space:nowrap; }
      .line2 { animation: type2 1.2s steps(35) 2.2s both, fadein 0.1s 2.2s both; overflow:hidden; white-space:nowrap; }
      .line3 { animation: type3 1.5s steps(44) 3.6s both, fadein 0.1s 3.6s both; overflow:hidden; white-space:nowrap; }
      .line4 { animation: type4 0.8s steps(25) 5.3s both, fadein 0.1s 5.3s both; overflow:hidden; white-space:nowrap; }
      .line5 { animation: type5 1.3s steps(38) 6.3s both, fadein 0.1s 6.3s both; overflow:hidden; white-space:nowrap; }
      .line6 { animation: type6 1.1s steps(32) 7.8s both, fadein 0.1s 7.8s both; overflow:hidden; white-space:nowrap; }
      .line7 { animation: type7 0.7s steps(22) 9.1s both, fadein 0.1s 9.1s both; overflow:hidden; white-space:nowrap; }
      .output1 { animation: fadein 0.3s 2.0s both; }
      .output2 { animation: fadein 0.3s 3.4s both; }
      .output3 { animation: fadein 0.3s 5.1s both; }
      .output4 { animation: fadein 0.3s 6.1s both; }
      .output5 { animation: fadein 0.3s 7.6s both; }
      .output6 { animation: fadein 0.3s 8.9s both; }
      .output7 { animation: fadein 0.3s 10.0s both; }
      .prompt { fill: #50fa7b; }
      .cmd { fill: #f8f8f2; }
      .output { fill: #6272a4; }
      .accent { fill: #bd93f9; }
      .string { fill: #f1fa8c; }
      .comment { fill: #6272a4; }
      .title { fill: #ff79c6; }
    </style>
  </defs>

  <!-- Terminal Window -->
  <rect x="0" y="0" width="700" height="400" rx="10" ry="10" fill="#282a36"/>
  <rect x="0" y="0" width="700" height="35" rx="10" ry="10" fill="#21222c"/>
  <rect x="0" y="25" width="700" height="10" fill="#21222c"/>

  <!-- Window Buttons -->
  <circle cx="20" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="17" r="6" fill="#27c93f"/>

  <!-- Title -->
  <text x="350" y="22" text-anchor="middle" font-family="monospace" font-size="13" fill="#6272a4">zedxlab@termux ~ %</text>

  <!-- Line 1: whoami -->
  <text x="20" y="65" font-family="monospace" font-size="13">
    <tspan class="prompt">$</tspan>
    <tspan class="cmd"> whoami</tspan>
  </text>
  <text x="20" y="85" font-family="monospace" font-size="13" class="output1" opacity="0">
    <tspan class="accent">Zade</tspan> <tspan class="comment"># AI Builder, Scraper, API Architect</tspan>
  </text>

  <!-- Line 2: cat skills -->
  <text x="20" y="115" font-family="monospace" font-size="13" class="line2" opacity="0">
    <tspan class="prompt">$</tspan>
    <tspan class="cmd"> cat /etc/skills.list</tspan>
  </text>
  <text x="20" y="135" font-family="monospace" font-size="13" class="output2" opacity="0">
    <tspan class="string">Python</tspan> <tspan class="comment">|</tspan> <tspan class="string">Node.js</tspan> <tspan class="comment">|</tspan> <tspan class="string">Chromium CDP</tspan> <tspan class="comment">|</tspan> <tspan class="string">Vercel</tspan> <tspan class="comment">|</tspan> <tspan class="string">Telegram Bots</tspan>
  </text>

  <!-- Line 3: docker ps -->
  <text x="20" y="165" font-family="monospace" font-size="13" class="line3" opacity="0">
    <tspan class="prompt">$</tspan>
    <tspan class="cmd"> docker ps --format "table {{.Names}}\t{{.Status}}"</tspan>
  </text>
  <text x="20" y="185" font-family="monospace" font-size="12" class="output3" opacity="0">
    <tspan class="title">NAMES</tspan>          <tspan class="title">STATUS</tspan>
  </text>
  <text x="20" y="200" font-family="monospace" font-size="12" class="output3" opacity="0">
    <tspan class="accent">chatgpt-scraper</tspan>  <tspan class="string">Up 3 days</tspan>
  </text>
  <text x="20" y="215" font-family="monospace" font-size="12" class="output3" opacity="0">
    <tspan class="accent">ddg-api</tspan>          <tspan class="string">Up 7 days</tspan>
  </text>
  <text x="20" y="230" font-family="monospace" font-size="12" class="output3" opacity="0">
    <tspan class="accent">imagen-bot</tspan>       <tspan class="string">Up 12 hours</tspan>
  </text>

  <!-- Line 4: uptime -->
  <text x="20" y="260" font-family="monospace" font-size="13" class="line4" opacity="0">
    <tspan class="prompt">$</tspan>
    <tspan class="cmd"> uptime</tspan>
  </text>
  <text x="20" y="280" font-family="monospace" font-size="13" class="output4" opacity="0">
    <tspan class="accent">14:32:01 up 42 days</tspan> <tspan class="comment">| 9 repos | 3 APIs deployed</tspan>
  </text>

  <!-- Line 5: ls repos -->
  <text x="20" y="310" font-family="monospace" font-size="13" class="line5" opacity="0">
    <tspan class="prompt">$</tspan>
    <tspan class="cmd"> ls ~/repos/ --color=auto</tspan>
  </text>
  <text x="20" y="330" font-family="monospace" font-size="12" class="output5" opacity="0">
    <tspan class="accent">chatgpt-scraper/</tspan>  <tspan class="accent">imagen.py/</tspan>  <tspan class="accent">ddg-api/</tspan>  <tspan class="accent">hotbot/</tspan>  <tspan class="accent">pin-api/</tspan>  <tspan class="accent">wallpaper-api/</tspan>
  </text>

  <!-- Line 6: echo status -->
  <text x="20" y="360" font-family="monospace" font-size="13" class="line6" opacity="0">
    <tspan class="prompt">$</tspan>
    <tspan class="cmd"> echo "Status: $(curl -s zedxlab.vercel.app/api/health)"</tspan>
  </text>
  <text x="20" y="380" font-family="monospace" font-size="13" class="output6" opacity="0">
    <tspan class="string">Status: ALL SYSTEMS OPERATIONAL</tspan> <tspan class="comment">|</tspan> <tspan class="accent">0 errors</tspan>
  </text>

  <!-- Line 7: cursor -->
  <text x="20" y="395" font-family="monospace" font-size="13" class="line7" opacity="0">
    <tspan class="prompt">$</tspan>
    <tspan class="cursor" fill="#50fa7b">_</tspan>
  </text>
</svg>
