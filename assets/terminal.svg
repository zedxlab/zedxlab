<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 480" width="750" height="480">
  <!-- Terminal Window -->
  <rect x="0" y="0" width="750" height="480" rx="10" ry="10" fill="#282a36"/>
  <rect x="0" y="0" width="750" height="35" rx="10" ry="10" fill="#21222c"/>
  <rect x="0" y="25" width="750" height="10" fill="#21222c"/>

  <!-- Window Buttons -->
  <circle cx="20" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="17" r="6" fill="#27c93f"/>

  <!-- Title -->
  <text x="375" y="22" text-anchor="middle" font-family="monospace" font-size="13" fill="#6272a4">zedxlab@termux ~ %</text>

  <!-- $ whoami — appears at 0.5s -->
  <text x="20" y="65" font-family="monospace" font-size="14" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.5s" fill="freeze"/>
    <tspan fill="#50fa7b">$</tspan>
    <tspan fill="#f8f8f2"> whoami</tspan>
    <tspan fill="#50fa7b">
      _
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </tspan>
  </text>

  <!-- name — appears at 1.2s -->
  <text x="20" y="88" font-family="monospace" font-size="13" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.2s" fill="freeze"/>
    <tspan fill="#ff79c6">  name:</tspan>
    <tspan fill="#8be9fd"> Zade</tspan>
  </text>

  <!-- alias — appears at 1.8s -->
  <text x="20" y="106" font-family="monospace" font-size="13" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.8s" fill="freeze"/>
    <tspan fill="#ff79c6">  alias:</tspan>
    <tspan fill="#8be9fd"> ZEDXLAB</tspan>
  </text>

  <!-- role — appears at 2.4s -->
  <text x="20" y="124" font-family="monospace" font-size="13" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.4s" fill="freeze"/>
    <tspan fill="#ff79c6">  role:</tspan>
    <tspan fill="#8be9fd"> AI Engineer &amp; API Architect</tspan>
  </text>

  <!-- location — appears at 3.0s -->
  <text x="20" y="142" font-family="monospace" font-size="13" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.0s" fill="freeze"/>
    <tspan fill="#ff79c6">  location:</tspan>
    <tspan fill="#8be9fd"> Mexico</tspan>
  </text>

  <!-- focus — appears at 3.6s -->
  <text x="20" y="160" font-family="monospace" font-size="13" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.6s" fill="freeze"/>
    <tspan fill="#ff79c6">  focus:</tspan>
    <tspan fill="#8be9fd"> Building free, open AI tools</tspan>
  </text>

  <!-- stack — appears at 4.2s -->
  <text x="20" y="178" font-family="monospace" font-size="13" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.2s" fill="freeze"/>
    <tspan fill="#ff79c6">  stack:</tspan>
    <tspan fill="#8be9fd"> Node.js | Python | CDP | Vercel | TG Bots</tspan>
  </text>

  <!-- philosophy — appears at 4.8s -->
  <text x="20" y="196" font-family="monospace" font-size="13" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.8s" fill="freeze"/>
    <tspan fill="#ff79c6">  philosophy:</tspan>
    <tspan fill="#f1fa8c"> "If it costs money, someone will build it free"</tspan>
  </text>

  <!-- status — appears at 5.4s -->
  <text x="20" y="214" font-family="monospace" font-size="13" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="5.4s" fill="freeze"/>
    <tspan fill="#ff79c6">  status:</tspan>
    <tspan fill="#50fa7b"> Always shipping, never stopping</tspan>
  </text>

  <!-- Separator — appears at 6.0s -->
  <text x="20" y="238" font-family="monospace" font-size="13" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="6.0s" fill="freeze"/>
    <tspan fill="#6272a4">  ────────────────────────────────────────────────</tspan>
  </text>

  <!-- $ cat stats — appears at 6.6s -->
  <text x="20" y="260" font-family="monospace" font-size="14" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="6.6s" fill="freeze"/>
    <tspan fill="#50fa7b">$</tspan>
    <tspan fill="#f8f8f2"> cat /etc/stats.json</tspan>
    <tspan fill="#50fa7b">
      _
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </tspan>
  </text>

  <!-- repos — appears at 7.2s -->
  <text x="20" y="282" font-family="monospace" font-size="13" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="7.2s" fill="freeze"/>
    <tspan fill="#ff79c6">  repos:</tspan>
    <tspan fill="#8be9fd"> 9+ public</tspan>
    <tspan fill="#6272a4"> | </tspan>
    <tspan fill="#ff79c6">apis:</tspan>
    <tspan fill="#8be9fd"> 3 deployed on Vercel</tspan>
  </text>

  <!-- models — appears at 7.8s -->
  <text x="20" y="300" font-family="monospace" font-size="13" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="7.8s" fill="freeze"/>
    <tspan fill="#ff79c6">  models:</tspan>
    <tspan fill="#8be9fd"> 13 image generators</tspan>
    <tspan fill="#6272a4"> | </tspan>
    <tspan fill="#ff79c6">voices:</tspan>
    <tspan fill="#8be9fd"> 470+ TTS voices</tspan>
  </text>

  <!-- os — appears at 8.4s -->
  <text x="20" y="318" font-family="monospace" font-size="13" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="8.4s" fill="freeze"/>
    <tspan fill="#ff79c6">  os:</tspan>
    <tspan fill="#8be9fd"> Linux aarch64 (Termux)</tspan>
    <tspan fill="#6272a4"> | </tspan>
    <tspan fill="#ff79c6">shell:</tspan>
    <tspan fill="#8be9fd"> bash</tspan>
  </text>

  <!-- editor — appears at 9.0s -->
  <text x="20" y="336" font-family="monospace" font-size="13" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="9.0s" fill="freeze"/>
    <tspan fill="#ff79c6">  editor:</tspan>
    <tspan fill="#8be9fd"> Claude Code + OpenClaude</tspan>
    <tspan fill="#6272a4"> | </tspan>
    <tspan fill="#ff79c6">ide:</tspan>
    <tspan fill="#8be9fd"> VS Code</tspan>
  </text>

  <!-- Separator — appears at 9.6s -->
  <text x="20" y="360" font-family="monospace" font-size="13" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="9.6s" fill="freeze"/>
    <tspan fill="#6272a4">  ────────────────────────────────────────────────</tspan>
  </text>

  <!-- $ echo — appears at 10.2s -->
  <text x="20" y="382" font-family="monospace" font-size="14" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="10.2s" fill="freeze"/>
    <tspan fill="#50fa7b">$</tspan>
    <tspan fill="#f8f8f2"> echo "Status: $(curl -s zedxlab.vercel.app/api/health)"</tspan>
    <tspan fill="#50fa7b">
      _
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </tspan>
  </text>

  <!-- Status output — appears at 10.8s -->
  <text x="20" y="404" font-family="monospace" font-size="14" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="10.8s" fill="freeze"/>
    <tspan fill="#50fa7b">  Status: ALL SYSTEMS OPERATIONAL</tspan>
    <tspan fill="#6272a4"> | </tspan>
    <tspan fill="#8be9fd">0 errors</tspan>
  </text>

  <!-- Final prompt — appears at 11.4s -->
  <text x="20" y="430" font-family="monospace" font-size="14" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="11.4s" fill="freeze"/>
    <tspan fill="#50fa7b">$</tspan>
    <tspan fill="#50fa7b">
      _
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </tspan>
  </text>
</svg>
